<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smakosz Lokalny PWA</title>
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#212529" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Smakosz" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>#map { height: 250px; }</style>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark shadow-sm mb-3">
        <div class="container-fluid justify-content-center">
            <span class="navbar-brand mb-0 h1">🍳 Smakosz Lokalny</span>
            <button id="installBtn" class="btn btn-outline-warning btn-sm d-none">Zainstaluj</button>
        </div>
    </nav>
    <div class="container" id="app-content">
      <div class="card border-0 shadow-sm p-3 mb-3 text-center">
        <label class="form-label fw-bold">1. Zrób zdjęcie dania:</label>
        <div
          class="preview-container mb-2 shadow-sm"
          style="background: #000; min-height: 200px; position: relative"
        >
          <span
            id="placeholder-text"
            style="color: #fff; position: absolute; top: 45%; left: 30%"
            >Inicjalizacja aparatu...</span
          >
          <video
            id="video"
            autoplay
            playsinline
            style="width: 100%; display: block"
          ></video>
          <canvas id="canvas" style="display: none"></canvas>
          <img
            id="photo-preview"
            style="display: none; width: 100%"
            alt="Zrobione zdjęcie"
          />
        </div>
        <div class="d-flex gap-2">
          <button id="snap" class="btn btn-danger w-100">Zrób zdjęcie</button>
          <button
            id="retake"
            class="btn btn-secondary w-100"
            style="display: none"
          >
            Powtórz
          </button>
        </div>
      </div>

      <div class="card border-0 shadow-sm p-3 mb-3">
        <label class="form-label fw-bold">2. Twoja lokalizacja:</label>
        <div id="location-status" class="text-muted small mb-1">Pobieranie lokalizacji...</div>
        <div id="map"></div>
      </div>

      <button
        id="share-btn"
        class="btn btn-primary w-100 btn-lg shadow"
        disabled
      >
        Udostępnij polecenie znajomym
      </button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="camera.js"></script>
    <script src="app.js"></script>
    <script src="share.js"></script>
  </body>
</html>
